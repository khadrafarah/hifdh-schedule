<!DOCTYPE html>
<html lang="en" style="color-scheme: light only;">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light only" />
<meta name="theme-color" content="#f4e8d2" />
<meta name="supported-color-schemes" content="light" />
<title>Hifdh Schedule</title>
<style>
  :root{
    --gold: #c9952c;
    --gold-dark: #b27f1f;
    --cream: #f4e8d2;
    --cell-bg: #fbede2;
    --ink: #5a2e1d;
    --ink-soft: #7a4a32;
    --border: #b9842a;
    --done-bg: #d9d2c4;
  }

  *{ box-sizing: border-box; forced-color-adjust: none; }

  html{
    color-scheme: light only;
    background: #f4e8d2;
  }

  @media (prefers-color-scheme: dark){
    html, body{
      background: #f4e8d2 !important;
      color: #5a2e1d !important;
    }
  }

  body{
    margin:0;
    color-scheme: light only;
    padding: 24px 12px 48px;
    background: var(--cream);
    font-family: "Segoe UI", Tahoma, "Geeza Pro", Arial, sans-serif;
    color: var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .table-wrap{
    width:100%;
    max-width: 1100px;
    overflow-x:auto;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(90,46,29,0.18);
  }

  table.schedule{
    border-collapse: collapse;
    width:100%;
    min-width: 900px;
    background: var(--cell-bg);
  }

  table.schedule th,
  table.schedule td{
    border: 1.5px solid var(--border);
    padding: 10px 12px;
    text-align:center;
    vertical-align:middle;
  }

  thead th{
    background: var(--gold);
    color: var(--ink);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  th.vert-head{
    background: var(--gold);
    width: 46px;
  }

  td.day-cell{
    background: var(--gold);
    color: var(--ink);
    font-weight: 800;
    font-size: 17px;
    width: 70px;
    white-space: pre-wrap;
  }

  td.data-cell{
    background: var(--cell-bg);
    font-size: 18px;
    font-weight: 700;
  }

  td.task-cell{
    cursor: pointer;
  }

  td.task-cell.completed{
    background: var(--done-bg);
  }

  .cell-inner{
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
  }

  td.task-cell.completed .cell-inner,
  td.task-cell.completed .line-main,
  td.task-cell.completed .line-sub{
    text-decoration: line-through;
    text-decoration-color: var(--ink-soft);
    opacity: 0.5;
  }

  .line-main{
    font-size: 19px;
    font-weight: 800;
    line-height:1.25;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
  }

  .line-sub{
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-top: 2px;
    line-height:1.2;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
  }

  td.vert-cell{
    background: var(--cell-bg);
    width: 46px;
    padding: 6px 4px;
  }

  .vert-text{
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: 800;
    font-size: 14px;
    line-height:1.35;
    margin: 0 auto;
    letter-spacing: 0.3px;
    white-space: pre-wrap;
  }

  tr.sat-row td.day-cell{
    background: var(--gold);
  }

  td.sat-merged{
    font-size: 30px;
    font-weight: 800;
  }

  td.name-cell{
    background: var(--cell-bg);
  }

  .name-label{
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  input.name-input{
    width: 100%;
    border: none;
    background: transparent;
    border-bottom: 2px solid var(--border);
    text-align:center;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    font-family: inherit;
    padding: 4px 2px;
    outline:none;
  }

  input.name-input:focus{
    border-bottom-color: var(--gold-dark);
  }

  [contenteditable="true"]{
    border-radius: 4px;
    transition: background 0.15s ease, outline 0.15s ease;
    outline: none;
  }

  [contenteditable="true"]:hover{
    background: rgba(255,255,255,0.35);
  }

  [contenteditable="true"]:focus{
    background: #ffffff;
    outline: 2px dashed var(--gold-dark);
  }

  .hint{
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0.85;
    text-align:center;
  }

  .hint.saved{
    color: #3f7d3f;
  }

  .personal-tasks{
    width: 100%;
    max-width: 1100px;
    margin-top: 26px;
  }

  .pt-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 10px;
  }

  .pt-header h2{
    font-size: 15px;
    font-weight: 800;
    margin: 0;
    color: var(--ink);
  }

  .add-task-btn{
    background: var(--gold);
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  .add-task-btn:hover{
    background: var(--gold-dark);
    color: #fff;
  }

  .pt-table-wrap{
    width: 100%;
    overflow-x: auto;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(90,46,29,0.12);
  }

  table.personal-table{
    border-collapse: collapse;
    width: 100%;
    min-width: 480px;
    background: var(--cell-bg);
  }

  table.personal-table th,
  table.personal-table td{
    border: 1.5px solid var(--border);
    padding: 9px 10px;
    text-align: center;
    vertical-align: middle;
  }

  table.personal-table thead th{
    background: var(--gold);
    color: var(--ink);
    font-size: 14px;
    font-weight: 800;
  }

  table.personal-table th.day-col{ width: 90px; }
  table.personal-table th.check-col{ width: 56px; }
  table.personal-table th.remove-col{ width: 36px; }

  tr.task-item.completed{
    background: var(--done-bg);
  }

  tr.task-item.completed .task-text{
    text-decoration: line-through;
    text-decoration-color: var(--ink-soft);
    opacity: 0.55;
  }

  .day-text,
  .task-text{
    outline: none;
    font-size: 15px;
    font-weight: 600;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
    border-radius: 4px;
    min-height: 18px;
  }

  .task-text{ text-align: left; }

  .day-text:empty:before{
    content: "Day";
    opacity: 0.4;
  }

  .task-text:empty:before{
    content: "Task";
    opacity: 0.4;
  }

  .day-text:focus,
  .task-text:focus{
    background: #ffffff;
  }

  .check-btn{
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    color: #ffffff;
    font-size: 14px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .check-btn.checked{
    background: var(--gold-dark);
    border-color: var(--gold-dark);
  }

  .remove-task{
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
    font-family: inherit;
  }

  .remove-task:hover{
    color: #a33;
  }

  .empty-tasks td{
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0.7;
    padding: 10px;
  }
</style>
</head>
<body>

  <div class="table-wrap">
    <div id="app"></div>
  </div>
  <p class="hint" id="hint">Tap to edit, Enter for a new line · double-tap a task to mark it done</p>

  <div class="personal-tasks">
    <div class="pt-header">
      <h2>Personal Tasks</h2>
      <button id="addTaskBtn" class="add-task-btn">+ Add Task</button>
    </div>
    <div class="pt-table-wrap">
      <table class="personal-table">
        <thead>
          <tr>
            <th class="day-col">Day</th>
            <th>Task</th>
            <th class="check-col">✓</th>
            <th class="remove-col"></th>
          </tr>
        </thead>
        <tbody id="personalTaskList"></tbody>
      </table>
    </div>
  </div>

<script>
  const STORAGE_KEY = "fajr-hifdh-schedule-table";

  function emptyChecks(){
    return { distant: false, recent: false, newly: false, prep: false };
  }

  const defaultState = {
    headers: [
      "The Day",
      "The distant past",
      "The recent past",
      "The newly memorized recite",
      "",
      "Weekly preparation only reading"
    ],
    vertical: "Pray by the memorized Aayat throughout the day in both obligatory and voluntary prayers",
    rows: [
      { day: "Sun", distant: "البقرة", recentMain: "المائدة +", recentSub: "times 2 <--- 137 : 132 الأنعام", newlyMain: "الأعراف 1 : 170", newlySub: "", prep: "التوبة", completed: emptyChecks() },
      { day: "Mon", distant: "ال عمران", recentMain: "الأنعام +", recentSub: "times 2 <--- 137 : 125 الأنعام", newlyMain: "الأعراف 1 : 178", newlySub: "", prep: "التوبة", completed: emptyChecks() },
      { day: "Tue", distant: "النساء", recentMain: "المائدة +", recentSub: "times 2 <--- 137 : 119 الأنعام", newlyMain: "الأعراف 1 : 187", newlySub: "", prep: "التوبة", completed: emptyChecks() },
      { day: "Wed", distant: "البقرة", recentMain: "الأنعام +", recentSub: "times 2 <--- 137 : 111 الأنعام", newlyMain: "الأعراف 1 : 195", newlySub: "", prep: "التوبة", completed: emptyChecks() },
      { day: "Thu", distant: "ال عمران", recentMain: "المائدة +", recentSub: "times 2 <--- 137 : 111 الأنعام", newlyMain: "الأعراف", newlySub: "", prep: "التوبة", completed: emptyChecks() },
      { day: "Fri", distant: "النساء", recentMain: "الأنعام +", recentSub: "times 2 <--- 137 : 111 الأنعام", newlyMain: "الأعراف", newlySub: "3 times", prep: "التوبة", completed: emptyChecks() }
    ],
    satDay: "Sat",
    satMerged: "times 5 <--- الأعراف",
    satCompleted: false,
    satNameLabel: "The name :",
    satNameValue: "",
    personalTasks: []
  };

  let state = JSON.parse(JSON.stringify(defaultState));
  const app = document.getElementById("app");
  const hint = document.getElementById("hint");

  function esc(str){
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function escMultiline(str){
    return esc(str).replace(/\n/g, "<br>");
  }

  function getPath(obj, path){
    return path.split(".").reduce((o, k) => (o == null ? o : o[k]), obj);
  }

  function setPath(obj, path, value){
    const parts = path.split(".");
    let cur = obj;
    for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
    cur[parts[parts.length - 1]] = value;
  }

  function singleTaskCell(textPath, text, completedPath, completed){
    return `
      <td class="data-cell task-cell${completed ? " completed" : ""}" data-completed-path="${completedPath}">
        <div class="cell-inner" data-path="${textPath}" contenteditable="true">${escMultiline(text)}</div>
      </td>`;
  }

  function twoLineTaskCell(mainPath, mainText, subPath, subText, completedPath, completed){
    return `
      <td class="data-cell task-cell${completed ? " completed" : ""}" data-completed-path="${completedPath}">
        <div class="line-main" data-path="${mainPath}" contenteditable="true">${escMultiline(mainText)}</div>
        <div class="line-sub" data-path="${subPath}" contenteditable="true">${escMultiline(subText)}</div>
      </td>`;
  }

  function render(){
    app.innerHTML = `
      <table class="schedule">
        <thead>
          <tr>
            <th data-path="headers.0" contenteditable="true">${escMultiline(state.headers[0])}</th>
            <th data-path="headers.1" contenteditable="true">${escMultiline(state.headers[1])}</th>
            <th data-path="headers.2" contenteditable="true">${escMultiline(state.headers[2])}</th>
            <th data-path="headers.3" contenteditable="true">${escMultiline(state.headers[3])}</th>
            <th class="vert-head"></th>
            <th data-path="headers.5" contenteditable="true">${escMultiline(state.headers[5])}</th>
          </tr>
        </thead>
        <tbody>
          ${state.rows.map((r, i) => `
          <tr>
            <td class="day-cell" data-path="rows.${i}.day" contenteditable="true">${escMultiline(r.day)}</td>
            ${singleTaskCell(`rows.${i}.distant`, r.distant, `rows.${i}.completed.distant`, r.completed.distant)}
            ${twoLineTaskCell(`rows.${i}.recentMain`, r.recentMain, `rows.${i}.recentSub`, r.recentSub, `rows.${i}.completed.recent`, r.completed.recent)}
            ${twoLineTaskCell(`rows.${i}.newlyMain`, r.newlyMain, `rows.${i}.newlySub`, r.newlySub, `rows.${i}.completed.newly`, r.completed.newly)}
            ${i === 0 ? `<td class="vert-cell" rowspan="7"><div class="vert-text" data-path="vertical" contenteditable="true">${escMultiline(state.vertical)}</div></td>` : ""}
            ${singleTaskCell(`rows.${i}.prep`, r.prep, `rows.${i}.completed.prep`, r.completed.prep)}
          </tr>`).join("")}
          <tr class="sat-row">
            <td class="day-cell" data-path="satDay" contenteditable="true">${escMultiline(state.satDay)}</td>
            <td class="sat-merged data-cell task-cell${state.satCompleted ? " completed" : ""}" colspan="3" data-completed-path="satCompleted">
              <div class="cell-inner" data-path="satMerged" contenteditable="true">${escMultiline(state.satMerged)}</div>
            </td>
            <td class="name-cell">
              <div class="name-label" data-path="satNameLabel" contenteditable="true">${escMultiline(state.satNameLabel)}</div>
              <input class="name-input" id="nameInput" value="${esc(state.satNameValue)}" />
            </td>
          </tr>
        </tbody>
      </table>
    `;
  }

  function renderPersonalTasks(){
    const list = document.getElementById("personalTaskList");
    if (!list) return;
    if (state.personalTasks.length === 0){
      list.innerHTML = `<tr class="empty-tasks"><td colspan="4">No personal tasks yet — add one above.</td></tr>`;
      return;
    }
    list.innerHTML = state.personalTasks.map(t => `
      <tr class="task-item${t.completed ? " completed" : ""}" data-id="${t.id}">
        <td><div class="day-text" data-id="${t.id}" contenteditable="true">${escMultiline(t.day || "")}</div></td>
        <td><div class="task-text" data-id="${t.id}" contenteditable="true">${escMultiline(t.text || "")}</div></td>
        <td><button class="check-btn${t.completed ? " checked" : ""}" data-id="${t.id}" aria-pressed="${t.completed}">${t.completed ? "✓" : ""}</button></td>
        <td><button class="remove-task" data-id="${t.id}" aria-label="Remove task">×</button></td>
      </tr>
    `).join("");
  }

  function addPersonalTask(){
    const id = "pt" + Date.now() + Math.floor(Math.random() * 1000);
    state.personalTasks.push({ id, day: "", text: "", completed: false });
    renderPersonalTasks();
    scheduleSave();
    const newEl = document.querySelector(`.task-text[data-id="${id}"]`);
    if (newEl) newEl.focus();
  }

  function removePersonalTask(id){
    state.personalTasks = state.personalTasks.filter(t => t.id !== id);
    renderPersonalTasks();
    scheduleSave();
  }

  function toggleTaskComplete(id){
    const task = state.personalTasks.find(t => t.id === id);
    if (!task) return;
    task.completed = !task.completed;
    const row = document.querySelector(`tr.task-item[data-id="${id}"]`);
    if (row){
      row.classList.toggle("completed", task.completed);
      const btn = row.querySelector(".check-btn");
      if (btn){
        btn.classList.toggle("checked", task.completed);
        btn.textContent = task.completed ? "✓" : "";
        btn.setAttribute("aria-pressed", task.completed);
      }
    }
    scheduleSave();
  }

  // Multi-line support: Enter inserts a line break instead of leaving the field or growing a new block
  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && e.target.isContentEditable){
      e.preventDefault();
      document.execCommand("insertLineBreak");
    }
  });

  // Text edits
  document.addEventListener("input", e => {
    const el = e.target;
    if (el.matches && el.matches("[contenteditable='true'][data-path]")){
      setPath(state, el.dataset.path, el.innerText);
      scheduleSave();
    } else if (el.matches && el.matches(".task-text[data-id]")){
      const task = state.personalTasks.find(t => t.id === el.dataset.id);
      if (task){
        task.text = el.innerText;
        scheduleSave();
      }
    } else if (el.matches && el.matches(".day-text[data-id]")){
      const task = state.personalTasks.find(t => t.id === el.dataset.id);
      if (task){
        task.day = el.innerText;
        scheduleSave();
      }
    } else if (el.id === "nameInput"){
      state.satNameValue = el.value;
      scheduleSave();
    }
  });

  // Double-tap / double-click to mark a table task complete
  document.addEventListener("dblclick", e => {
    const cell = e.target.closest(".task-cell");
    if (cell && cell.dataset.completedPath){
      e.preventDefault();
      const path = cell.dataset.completedPath;
      const newVal = !getPath(state, path);
      setPath(state, path, newVal);
      cell.classList.toggle("completed", newVal);
      scheduleSave();
      return;
    }
    const taskText = e.target.closest(".task-text");
    if (taskText){
      e.preventDefault();
      toggleTaskComplete(taskText.dataset.id);
    }
  });

  // Add / remove personal tasks, tap the checkmark to complete
  document.addEventListener("click", e => {
    if (e.target.id === "addTaskBtn"){
      addPersonalTask();
    } else if (e.target.classList.contains("remove-task")){
      removePersonalTask(e.target.dataset.id);
    } else if (e.target.classList.contains("check-btn")){
      toggleTaskComplete(e.target.dataset.id);
    }
  });

  let saveTimeout;
  function scheduleSave(){
    hint.textContent = "Saving…";
    hint.classList.remove("saved");
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
        hint.textContent = "Saved";
        hint.classList.add("saved");
        setTimeout(() => {
          hint.textContent = "Tap to edit, Enter for a new line · double-tap a task to mark it done";
          hint.classList.remove("saved");
        }, 1200);
      } catch (e) {
        hint.textContent = "Could not save — your edits stay on screen for now";
      }
    }, 500);
  }

  async function loadState(){
    try {
      const res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value){
        const loaded = JSON.parse(res.value);
        state = Object.assign({}, defaultState, loaded);
        if (!state.personalTasks) state.personalTasks = [];
      }
    } catch (e) {
      // no saved data yet, keep defaults
    }
    render();
    renderPersonalTasks();
  }

  loadState();
</script>
</body>
</html>
