<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Hifdh Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a84b;
    --gold-light: #e8d08a;
    --gold-dark: #8b6914;
    --sand: #f5edd8;
    --sand-dark: #e8d9b8;
    --brown: #5a3e1b;
    --brown-light: #7a5a30;
    --cream: #fdf8ef;
    --green: #2d6a4f;
    --green-light: #52b788;
    --done-bg: #e8f5ee;
    --done-border: #95d5b2;
    --shadow: 0 4px 24px rgba(90,62,27,0.13);
    /* UI surface tokens (light defaults) */
    --bg: #fdf8ef;
    --card-bg: #ffffff;
    --card-border: #e8d9b8;
    --card-header-bg: linear-gradient(90deg, #f5edd8 0%, rgba(245,237,216,0.3) 100%);
    --task-bg: #fdf8ef;
    --task-label: #5a3e1b;
    --task-placeholder: rgba(90,62,27,0.28);
    --task-underline: rgba(90,62,27,0.22);
    --task-done-bg: #edfaf3;
    --sidenote-bg: linear-gradient(135deg, #fff8e7, #f5edd8);
    --progress-track: #e8d9b8;
    --text-main: #5a3e1b;
    --text-muted: #7a5a30;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --gold: #d4a843;
      --gold-light: #e8c96a;
      --gold-dark: #c8a84b;
      --sand: #2a2118;
      --sand-dark: #3a2e1c;
      --brown: #f5e6c8;
      --brown-light: #d4b88a;
      --cream: #141008;
      --green: #52b788;
      --green-light: #40916c;
      --done-bg: #0a2016;
      --done-border: #2d6a4f;
      --shadow: 0 4px 28px rgba(0,0,0,0.5);
      /* UI surface tokens (dark overrides) */
      --bg: #141008;
      --card-bg: #1e1810;
      --card-border: #3a2e18;
      --card-header-bg: linear-gradient(90deg, #252010 0%, rgba(30,24,12,0.6) 100%);
      --task-bg: #181208;
      --task-label: #f5e6c8;
      --task-placeholder: rgba(245,230,200,0.35);
      --task-underline: rgba(245,230,200,0.2);
      --task-done-bg: #0a1e12;
      --sidenote-bg: linear-gradient(135deg, #1e1808, #252010);
      --progress-track: #2e2410;
      --text-main: #f5e6c8;
      --text-muted: #d4b88a;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(200,168,75,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(200,168,75,0.10) 0%, transparent 50%);
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    color: var(--text-main);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--brown) 0%, #3a2408 100%);
    padding: 36px 40px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      45deg, transparent, transparent 18px,
      rgba(200,168,75,0.06) 18px, rgba(200,168,75,0.06) 19px
    );
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }
  .header-inner { position: relative; z-index: 1; }

  .week-badge-wrap {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    border-radius: 2px;
    padding: 6px 16px;
    margin-bottom: 14px;
    flex-wrap: nowrap;
    justify-content: center;
  }
  .week-badge-label {
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-weight: 800; font-size: 13px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--brown);
  }
  .week-num-input {
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-weight: 800; font-size: 13px;
    letter-spacing: 3px;
    color: var(--brown);
    background: transparent;
    border: none; outline: none;
    border-bottom: 1.5px dashed rgba(90,62,27,0.45);
    width: 40px;
    text-align: center;
  }
  .week-num-input::placeholder { color: rgba(90,62,27,0.4); font-weight: 400; }
  .week-colon {
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-weight: 800; font-size: 13px;
    color: var(--brown);
    letter-spacing: 2px;
  }
  .week-date-input {
    font-family: 'Lato', sans-serif;
    font-weight: 700; font-size: 12px;
    color: var(--brown);
    background: rgba(255,255,255,0.45);
    border: none; outline: none;
    border-radius: 3px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .week-date-input::-webkit-calendar-picker-indicator { opacity: 0.6; cursor: pointer; }
  @media (prefers-color-scheme: dark) {
    .week-date-input {
      color: #1a1005;
      background: rgba(245,230,200,0.88);
    }
    .week-date-input::-webkit-calendar-picker-indicator { opacity: 0.7; }
  }

  header h1 {
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-size: clamp(20px, 7vw, 48px);
    color: var(--gold-light);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.2;
    white-space: normal;
    word-break: break-word;
  }
  .arabic-title {
    font-family: 'Amiri', serif;
    font-size: clamp(20px, 4vw, 34px);
    color: var(--gold);
    direction: rtl;
    display: block;
    margin-top: 6px;
    font-style: italic;
  }
  .header-sub {
    margin-top: 12px;
    color: rgba(232,208,138,0.6);
    font-size: 13px;
    letter-spacing: 1.5px;
    font-weight: 300;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    max-width: 860px;
    margin: 28px auto 0;
    padding: 0 24px;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gold-dark);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 10px; border-radius: 99px;
    background: var(--progress-track);
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── SIDE NOTE ── */
  .side-note {
    max-width: 860px;
    margin: 20px auto 0;
    padding: 0 24px;
  }
  .side-note-inner {
    background: var(--sidenote-bg);
    border: 1.5px solid var(--gold);
    border-left: 5px solid var(--gold);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 11px;
    font-family: 'Lato', sans-serif;
    text-transform: none;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .side-note-inner strong { color: var(--text-main); font-family: 'Lato', sans-serif; }

  /* ── DAILY CARDS ── */
  .days-grid {
    max-width: 860px;
    margin: 28px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .day-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .day-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.3); transform: translateY(-1px); }
  .day-card.all-done {
    border-color: var(--done-border);
    background: var(--done-bg);
  }

  .day-header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: var(--card-header-bg);
    border-bottom: 1px solid var(--card-border);
    cursor: pointer;
    user-select: none;
  }
  .day-card.all-done .day-header {
    background: linear-gradient(90deg, #d8f3e8, rgba(216,243,232,0.3));
    border-bottom-color: var(--done-border);
  }
  .day-name {
    font-family: 'Cinzel', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-size: 15px; font-weight: 600;
    color: var(--text-main);
    flex: 1;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
  }
  .day-card.all-done .day-name { color: var(--green); }
  @media (prefers-color-scheme: dark) { .day-card.all-done .day-name { color: var(--green-light); } }

  .done-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    background: var(--green-light); color: #fff;
    border-radius: 99px; padding: 3px 10px;
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
  }
  .day-card.all-done .done-badge { opacity: 1; }
  .chevron {
    font-size: 12px; color: var(--gold-dark);
    transition: transform 0.3s;
    margin-left: 8px;
  }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-tasks {
    display: none;
    padding: 14px 20px 18px;
    gap: 10px;
    flex-direction: column;
  }
  .day-card.open .day-tasks { display: flex; }

  /* TASK ROW */
  .task {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--task-bg);
    border: 1.5px solid transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .task.done {
    background: var(--task-done-bg);
    border-color: var(--done-border);
  }

  .task-check {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: transparent;
    transition: all 0.2s;
    cursor: pointer;
    flex-shrink: 0;
  }
  .task.done .task-check {
    background: var(--green-light);
    border-color: var(--green-light);
    color: #fff;
  }

  .task-content { flex: 1; min-width: 0; }
  .task-type {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--gold-dark);
    margin-bottom: 4px;
  }

  .task-editable {
    font-size: 13px; font-weight: 500; color: var(--task-label);
    background: transparent;
    border: none; outline: none;
    border-bottom: 1.5px dashed var(--task-underline);
    width: 100%;
    font-family: 'Lato', Arial, sans-serif !important;
    text-transform: none;
    letter-spacing: 0;
    padding: 2px 0;
    transition: border-color 0.2s, background 0.2s;
    border-radius: 2px;
  }
  .task-editable:focus {
    border-bottom-color: var(--gold);
    background: rgba(200,168,75,0.05);
    padding: 2px 4px;
  }
  .task-editable::placeholder { color: transparent; }
  .task.done .task-editable { color: var(--text-muted); opacity: 0.5; text-decoration: line-through; }

  /* SAT special */
  .sat-card {
    background: linear-gradient(135deg, var(--brown) 0%, #3a2408 100%);
    border-color: var(--gold);
    border-width: 2px;
  }
  @media (prefers-color-scheme: dark) {
    .sat-card {
      background: linear-gradient(135deg, #2a1e08 0%, #1a1205 100%);
      border-color: var(--gold);
      border-width: 2px;
    }
    .sat-card .day-name { color: var(--gold-light) !important; }
    .sat-card .task-editable { color: #f5e6c8 !important; }
    .sat-card .task-type { color: var(--gold-light) !important; }
    .sat-card .task { background: rgba(255,255,255,0.05); }
  }
  .sat-card .day-header {
    background: rgba(255,255,255,0.07);
    border-bottom-color: rgba(200,168,75,0.3);
  }
  .sat-card .day-name { color: var(--gold-light); }
  .sat-card .chevron { color: var(--gold); }
  .sat-card .task {
    background: rgba(255,255,255,0.07);
    border-color: rgba(200,168,75,0.15);
  }
  .sat-card .task.done { background: rgba(82,183,136,0.18); border-color: var(--green-light); }
  .sat-card .task-type { color: var(--gold); }
  .sat-card .task-editable { color: #fef9ee; border-bottom-color: rgba(200,168,75,0.3); }
  .sat-card .task-editable:focus { background: rgba(255,255,255,0.06); border-bottom-color: var(--gold-light); }
  .sat-card .task-editable::placeholder { color: rgba(232,208,138,0.35); }
  .sat-card .task.done .task-editable { color: rgba(255,255,255,0.38); }
  .sat-card .task-check { border-color: var(--gold); background: transparent; }
  .sat-card .task.done .task-check { background: var(--green-light); border-color: var(--green-light); }
  .sat-card .done-badge { background: var(--green); }

  .today-pip {
    display: inline-flex;
    align-items: center;
    font-family: 'Lato', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    background: var(--gold);
    color: #fff;
    border-radius: 99px;
    padding: 2px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sat-card .today-pip { background: #fff; color: var(--brown); }
  .today-card > .day-header { border-left: 4px solid var(--gold); }
  .sat-card.today-card > .day-header { border-left: 4px solid var(--gold); }

  /* Dark mode: day name and today pill on all cards */
  @media (prefers-color-scheme: dark) {
    .day-name { color: var(--text-main) !important; }
    .sat-card .day-name { color: var(--gold-light) !important; }
    .today-pip { background: var(--gold-light); color: #1a1005; }
    .sat-card .today-pip { background: #f5e6c8; color: #1a1005; }
  }

  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .day-card.all-done .done-badge { animation: popIn 0.35s ease; }

  @media (max-width: 500px) {
    header { padding: 28px 20px 24px; }
    .days-grid, .progress-wrap, .side-note { padding: 0 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="week-badge-wrap">
      <span class="week-badge-label">Week Starting:</span>
      <input class="week-date-input" id="weekDate" type="date" style="text-align:center;">
    </div>
    <h1>Weekly Hifdh Schedule</h1>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Weekly Progress</span>
    <span id="prog-text">0 / 0 tasks</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="prog-fill"></div>
  </div>
</div>

<div class="side-note">
  <div class="side-note-inner">
    🕌 <strong>Daily reminder:</strong> Pray using the memorised Aayat throughout the day in both <strong>obligatory and voluntary prayers</strong>.
  </div>
</div>

<div class="days-grid" id="days-grid"></div>

<script>
const defaultSchedule = [
  {
    day: "Sunday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Tomorrow's Page",     value: "" },
      { type: "Tuesday's Page",      value: "" },
      { type: "Weekly Reading Prep",       value: "" },
      { type: "Daily Wird",                value: "" },
    ]
  },
  {
    day: "Monday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Tomorrow's Page",     value: "" },
      { type: "Wednesday's Page",    value: "" },
      { type: "Weekly Reading Prep",       value: "" },
      { type: "Daily Wird",                value: "" },
    ]
  },
  {
    day: "Tuesday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Tomorrow's Page",     value: "" },
      { type: "Weekly Reading Prep", value: "" },
      { type: "Daily Wird",          value: "" },
    ]
  },
  {
    day: "Wednesday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Weekly Reading Prep", value: "" },
      { type: "Daily Wird",          value: "" },
    ]
  },
  {
    day: "Thursday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Weekly Reading Prep", value: "" },
      { type: "Daily Wird",          value: "" },
    ]
  },
  {
    day: "Friday", isSat: false,
    tasks: [
      { type: "Distant Past Review",        value: "" },
      { type: "Recent Past Review",         value: "" },
      { type: "New Memorisation",    value: "" },
      { type: "Sunday's Page",       value: "" },
      { type: "Weekly Reading Prep",       value: "" },
      { type: "Daily Wird",                value: "" },
    ]
  },
  {
    day: "Saturday", isSat: true,
    tasks: [
      { type: "New Memorisation Review",   value: "" },
      { type: "Tomorrow's Page",           value: "" },
      { type: "Monday's Page",            value: "" },
      { type: "Weekly Reading Prep",   value: "" },
      { type: "Daily Wird",            value: "" },
    ]
  },
];

function loadAll() {
  try { return JSON.parse(localStorage.getItem('fajr-tracker-v28') || '{}'); } catch { return {}; }
}
function saveAll(s) { localStorage.setItem('fajr-tracker-v28', JSON.stringify(s)); }

let appState = loadAll();

function getSchedule() {
  return defaultSchedule.map((dayObj, di) => ({
    ...dayObj,
    tasks: dayObj.tasks.map((task, ti) => ({
      ...task,
      value: (appState.values && appState.values[`${di}-${ti}`] !== undefined)
        ? appState.values[`${di}-${ti}`]
        : task.value,
    }))
  }));
}

function getChecked() { return appState.checked || {}; }

function setChecked(key, val) {
  if (!appState.checked) appState.checked = {};
  appState.checked[key] = val;
  saveAll(appState);
}

function setTaskValue(di, ti, val) {
  if (!appState.values) appState.values = {};
  appState.values[`${di}-${ti}`] = val;
  saveAll(appState);
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Build a display order starting from today
function getTodayStartIndex() {
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayName = dayNames[new Date().getDay()];
  const idx = defaultSchedule.findIndex(d => d.day === todayName);
  return idx === -1 ? 0 : idx;
}

function getDisplayOrder() {
  const start = getTodayStartIndex();
  const len = defaultSchedule.length;
  return Array.from({length: len}, (_, i) => (start + i) % len);
}

// Map from rendered position → original di (stored in card dataset)
function getOpenCards() {
  const open = new Set();
  document.querySelectorAll('.day-card').forEach(c => {
    if (c.classList.contains('open')) open.add(Number(c.dataset.di));
  });
  return open;
}

function render() {
  const schedule = getSchedule();
  const checked  = getChecked();
  const grid = document.getElementById('days-grid');
  const openCards = getOpenCards();
  const order = getDisplayOrder();

  grid.innerHTML = '';
  let totalTasks = 0, doneTasks = 0;

  // Count totals across all days regardless of order
  schedule.forEach((dayObj, di) => {
    totalTasks += dayObj.tasks.length;
    doneTasks += dayObj.tasks.filter((_, ti) => checked[`${di}-${ti}`]).length;
  });

  order.forEach(di => {
    const dayObj = schedule[di];
    const dayDone = dayObj.tasks.every((_, ti) => checked[`${di}-${ti}`]);
    const wasOpen = openCards.has(di);
    const isToday = di === getTodayStartIndex();

    const card = document.createElement('div');
    card.dataset.di = di;
    card.className = [
      'day-card',
      dayObj.isSat ? 'sat-card' : '',
      dayDone ? 'all-done' : '',
      wasOpen ? 'open' : '',
      isToday ? 'today-card' : '',
    ].filter(Boolean).join(' ');

    card.innerHTML = `
      <div class="day-header" onclick="toggleCardEl(this)">
        <span class="day-name">${dayObj.day}${isToday ? ' <span class="today-pip">Today</span>' : ''}</span>
        <span class="done-badge">✓ Done!</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-tasks">
        ${dayObj.tasks.map((task, ti) => {
          const done = !!checked[`${di}-${ti}`];
          return `
          <div class="task${done ? ' done' : ''}">
            <div class="task-check" onclick="toggleTask(${di},${ti})">${done ? '✓' : ''}</div>
            <div class="task-content">
              <div class="task-type">${task.type}</div>
              <input
                class="task-editable"
                type="text"
                placeholder=""
                value="${esc(task.value)}"
                oninput="handleInput(${di},${ti},this.value)"
                onclick="event.stopPropagation()"
              />
            </div>
          </div>`;
        }).join('')}
      </div>`;

    grid.appendChild(card);
  });

  const pct = totalTasks ? Math.round(doneTasks / totalTasks * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${doneTasks} / ${totalTasks} tasks · ${pct}%`;
}

function toggleCardEl(headerEl) {
  headerEl.closest('.day-card').classList.toggle('open');
}

function toggleCard(di) {
  document.querySelector(`.day-card[data-di="${di}"]`).classList.toggle('open');
}

function toggleTask(di, ti) {
  const checked = getChecked();
  setChecked(`${di}-${ti}`, !checked[`${di}-${ti}`]);
  render();
}

function handleInput(di, ti, val) {
  setTaskValue(di, ti, val);
  const schedule = getSchedule();
  const checked  = getChecked();
  const card = document.querySelector(`.day-card[data-di="${di}"]`);
  const dayDone = schedule[di].tasks.every((_, tii) => checked[`${di}-${tii}`]);
  card.classList.toggle('all-done', dayDone);
}

// Week date
const weekDateInput = document.getElementById('weekDate');
if (appState.weekDate) weekDateInput.value = appState.weekDate;
weekDateInput.addEventListener('change', () => { appState.weekDate = weekDateInput.value; saveAll(appState); });

render();

// Auto-open today's card (it's always first now)
setTimeout(() => {
  const todayCard = document.querySelector('.day-card.today-card');
  if (todayCard) todayCard.classList.add('open');
}, 50);
</script>
</body>
</html>
